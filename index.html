        <h1>Brett Dunsmore</h1>
        <h2>Senior Named Account Executive — Cloudflare</h2>

        <p>
          A career spanning IBM, The University of Queensland, Dell Technologies, and now Cloudflare has taught me one thing:
          technology only matters when it actually helps people.
        </p>

        <p>
          At Cloudflare, I work with Australian government agencies to modernise their infrastructure and workflows without
          starting from scratch — securing AI transformation across both human and agentic workflows, reviewing data governance
          and compliance, managing traffic across hybrid environments, handling real threats like bots and volumetric attacks,
          and improving application performance at the edge.
        </p>

        <p>
          Digital transformation starts with the workforce. Zero Trust isn't just a concept — it's making sure the right person
          has the right access at the right time, tied to identity and sensible policy, so corporate data stays protected
          wherever people work best.
        </p>

        <p>AI, Cloud, Zero Trust. They're just tools. Outcomes are what count.</p>

        <h3>Professional History</h3>
        <ul>
          <li><strong>Cloudflare</strong> (October 2025 – Present) — Senior Named Account Executive, Public Sector QLD/NT</li>
          <li>
            <strong>Dell Technologies</strong> (December 2017 – October 2025) — AI Solutions Strategy ANZ; Principal Solutions
            Executive; Data Centre Solutions Executive; Senior Systems Engineer; Systems Engineer / Solutions Consultant
          </li>
          <li>
            <strong>The University of Queensland</strong> (February 2009 – December 2017) — Senior IT Manager; Service Delivery
            Manager; Desktop Support — Institute for Molecular Bioscience
          </li>
          <li>
            <strong>IBM</strong> (June 2006 – February 2009) — Senior Technical Support; Customer Relations Manager;
            Technical Support Officer
          </li>
        </ul>

        <h3>Areas of expertise</h3>
        <p>
          Cybersecurity, Zero Trust, edge computing, AI strategy and security, generative and agentic AI, AI inference and
          training, NVIDIA AI Enterprise, digital transformation, public sector strategy and procurement, defence technologies,
          data centre infrastructure including power distribution and cooling, network fabrics, high-performance computing,
          hierarchical file systems, long-term data archive, data workflows and pipelines, data governance, and workforce
          transformation.
        </p>
