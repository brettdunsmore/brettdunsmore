        <h1>Brett Dunsmore</h1>
        <h2>Senior Named Account Executive, Cloudflare</h2>
        <p>A career spanning Dell Technologies, IBM, The University of Queensland, and now Cloudflare has taught me one thing: technology only matters when it actually helps people.</p>
        <p>At Cloudflare, I work with Australian government agencies to modernise their infrastructure and workflows without starting from scratch — securing AI transformation across both human and agentic workflows, reviewing data governance and compliance, managing traffic across hybrid environments, handling real threats like bots and volumetric attacks, and improving application performance at the edge.</p>
        <p>Digital transformation starts with the workforce. Zero Trust isn't just a concept — it's making sure the right person has the right access at the right time, tied to identity and sensible policy, so corporate data stays protected wherever people work best.</p>
        <p><strong>AI, Cloud, Zero Trust. They're just tools.</strong></p>
        <p><strong>Outcomes are what count.</strong></p>
